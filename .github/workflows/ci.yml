name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # --ignore-scripts skips the postinstall Rust build of the Cashu binaries,
      # which the test suite does not need (Cashu tools spawn them at runtime).
      - run: npm install --ignore-scripts
      - run: npm run lint
      - run: npm test
